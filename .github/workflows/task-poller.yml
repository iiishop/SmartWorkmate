name: task-poller

on:
  workflow_dispatch:
  schedule:
    - cron: "*/20 * * * *"

jobs:
  run-once:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
      - name: Dispatch one task
        run: python -m smartworkmate.cli run-once --repo-root . --execute
